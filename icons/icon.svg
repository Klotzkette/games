<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8d48b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="8" y="8" width="496" height="496" rx="82" fill="none" stroke="url(#gold)" stroke-width="4"/>
  <!-- Grid lines -->
  <line x1="190" y1="100" x2="190" y2="412" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <line x1="322" y1="100" x2="322" y2="412" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <line x1="100" y1="204" x2="412" y2="204" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <line x1="100" y1="308" x2="412" y2="308" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  <!-- X marks (neon pink) -->
  <g stroke="#ff2d95" stroke-width="10" stroke-linecap="round">
    <line x1="118" y1="118" x2="172" y2="186"/>
    <line x1="172" y1="118" x2="118" y2="186"/>
    <line x1="336" y1="222" x2="398" y2="290"/>
    <line x1="398" y1="222" x2="336" y2="290"/>
  </g>
  <!-- O marks (neon blue) -->
  <circle cx="256" cy="152" r="34" fill="none" stroke="#00d4ff" stroke-width="10"/>
  <circle cx="145" cy="360" r="34" fill="none" stroke="#00d4ff" stroke-width="10"/>
  <!-- § symbol -->
  <text x="256" y="385" text-anchor="middle" font-family="serif" font-size="100" font-weight="bold" fill="#c9a84c">§</text>
</svg>
