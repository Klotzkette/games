<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚖️ Kanzlei Kreuzer & Kreis — Tic Tac Toe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600&family=Press+Start+2P&display=swap');

        :root {
            --gold: #c9a84c;
            --gold-light: #e8d48b;
            --gold-dark: #a07e2e;
            --navy: #0a0a1a;
            --navy-light: #1a1a3e;
            --navy-lighter: #2a2a5c;
            --cream: #f5f0e8;
            --red: #c0392b;
            --red-light: #e74c3c;
            --neon-pink: #ff2d95;
            --neon-blue: #00d4ff;
            --neon-purple: #b44dff;
            --neon-green: #39ff14;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== § RAIN ===== */
        .rain-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .rain-drop {
            position: absolute;
            top: -60px;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            opacity: 0;
            pointer-events: none;
            animation: rainFall linear infinite;
            text-shadow: 0 0 8px rgba(201, 168, 76, 0.4);
        }
        @keyframes rainFall {
            0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
            5%   { opacity: var(--rain-opacity, 0.3); }
            85%  { opacity: var(--rain-opacity, 0.3); }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* ===== RETRO GRID FLOOR ===== */
        .retro-grid {
            position: fixed;
            bottom: 0; left: -50%;
            width: 200%; height: 45%;
            background: linear-gradient(transparent 0%, rgba(201, 168, 76, 0.03) 100%);
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center bottom;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(var(--gold-dark) 1px, transparent 1px),
                linear-gradient(90deg, var(--gold-dark) 1px, transparent 1px);
            background-size: 60px 40px;
            opacity: 0.12;
            animation: gridScroll 2s linear infinite;
        }
        @keyframes gridScroll {
            0%   { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        /* ===== SCANLINES ===== */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== HEADER ===== */
        .header { margin-bottom: 8px; }
        .kanzlei-name {
            font-family: 'Playfair Display', serif;
            font-size: 12px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 6px;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; text-shadow: 0 0 20px rgba(201, 168, 76, 0.5); }
        }
        .title {
            font-family: 'Press Start 2P', 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--cream);
            margin-bottom: 4px;
            text-shadow: 3px 3px 0 var(--neon-pink), -1px -1px 0 var(--neon-blue);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            from { text-shadow: 3px 3px 0 var(--neon-pink), -1px -1px 0 var(--neon-blue), 0 0 10px rgba(255,45,149,0.3); }
            to   { text-shadow: 3px 3px 0 var(--neon-blue), -1px -1px 0 var(--neon-pink), 0 0 20px rgba(0,212,255,0.4); }
        }
        .title .accent { color: var(--gold); }
        .subtitle {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: var(--neon-green);
            letter-spacing: 2px;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }
        .divider {
            width: 200px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-blue), transparent);
            margin: 12px auto;
            position: relative;
            animation: dividerPulse 3s ease-in-out infinite;
        }
        @keyframes dividerPulse {
            0%, 100% { box-shadow: 0 0 5px var(--neon-pink); }
            50% { box-shadow: 0 0 15px var(--neon-blue); }
        }
        .divider::after {
            content: '§';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--navy);
            padding: 0 12px;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 18px;
        }

        /* ===== MUSIC CONTROL ===== */
        .music-controls {
            position: fixed;
            top: 15px; right: 15px;
            z-index: 500;
            display: flex; gap: 8px;
        }
        .music-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            padding: 6px 12px;
            border: 1px solid var(--neon-pink);
            background: rgba(255,45,149,0.1);
            color: var(--neon-pink);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 5px var(--neon-pink);
        }
        .music-btn:hover {
            background: rgba(255,45,149,0.3);
            box-shadow: 0 0 15px rgba(255,45,149,0.4);
        }
        .music-btn.active {
            background: var(--neon-pink);
            color: var(--navy);
            text-shadow: none;
        }

        /* ===== SCOREBOARD ===== */
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 12px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }
        .score-card {
            background: rgba(26,26,62,0.8);
            border: 1px solid var(--gold-dark);
            border-radius: 8px;
            padding: 8px 18px;
            min-width: 130px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .score-card.active {
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255,45,149,0.25), inset 0 0 15px rgba(255,45,149,0.05);
            transform: scale(1.05);
        }
        .score-card .player-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
            margin-bottom: 2px;
        }
        .score-card .player-name {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            color: var(--cream);
            margin-bottom: 4px;
        }
        .score-card .score-value {
            font-family: 'Press Start 2P', monospace;
            font-size: 24px;
            color: var(--gold-light);
            transition: all 0.3s ease;
        }
        .score-card .score-value.bump { animation: scoreBump 0.5s ease; }
        @keyframes scoreBump {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); }
            100% { transform: scale(1); }
        }

        /* ===== GAME BOARD ===== */
        .board-frame {
            background: linear-gradient(135deg, var(--neon-pink), var(--gold), var(--neon-blue));
            padding: 3px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(255,45,149,0.15), 0 0 60px rgba(0,212,255,0.1);
            animation: fadeInUp 1s ease-out 0.4s both, boardBreath 4s ease-in-out infinite;
        }
        @keyframes boardBreath {
            0%, 100% { box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(255,45,149,0.15); }
            50% { box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 50px rgba(0,212,255,0.2); }
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            background: var(--gold-dark);
            border-radius: 14px;
            overflow: hidden;
        }
        .cell {
            width: 115px; height: 115px;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 48px;
            font-weight: 900;
            font-family: 'Playfair Display', serif;
            color: var(--cream);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .cell::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: radial-gradient(circle, rgba(255,45,149,0.12), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }
        .cell:hover:not(.taken) { background: var(--navy-light); }
        .cell:hover:not(.taken)::before { width: 150px; height: 150px; }
        .cell.taken { cursor: default; }
        .cell .mark {
            display: inline-block;
            animation: stampIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .cell .mark.x-mark {
            color: var(--neon-pink);
            text-shadow: 0 0 15px rgba(255,45,149,0.6), 0 0 30px rgba(255,45,149,0.3);
        }
        .cell .mark.o-mark {
            color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(0,212,255,0.6), 0 0 30px rgba(0,212,255,0.3);
        }
        @keyframes stampIn {
            0%   { transform: scale(4) rotate(-30deg); opacity: 0; filter: blur(4px); }
            50%  { transform: scale(0.85) rotate(3deg); opacity: 1; filter: blur(0); }
            70%  { transform: scale(1.1) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Flash on cell place */
        .cell-flash {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            animation: cellFlash 0.3s ease-out forwards;
        }
        @keyframes cellFlash {
            0%   { background: rgba(255,255,255,0.6); }
            100% { background: transparent; }
        }

        /* Win */
        .cell.winning { animation: winPulse 0.5s ease-in-out infinite alternate; }
        @keyframes winPulse {
            from { background: var(--navy); }
            to   { background: var(--navy-lighter); box-shadow: inset 0 0 40px rgba(255,45,149,0.2); }
        }

        /* ===== STATUS ===== */
        .status-area {
            margin-top: 14px;
            min-height: 65px;
            animation: fadeInUp 1s ease-out 0.6s both;
        }
        .status-message {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            color: var(--cream);
            margin-bottom: 4px;
            transition: all 0.3s ease;
        }
        .status-message.announce {
            animation: announceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes announceIn {
            0%   { transform: scale(0.3) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .legal-quote {
            font-size: 11px;
            color: var(--gold-light);
            font-style: italic;
            opacity: 0.7;
            max-width: 420px;
            margin: 0 auto;
        }
        .legal-quote.fade-in { animation: fadeQuote 0.8s ease; }
        @keyframes fadeQuote {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 0.7; transform: translateY(0); }
        }

        /* ===== BUTTONS ===== */
        .btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 12px 28px;
            border: 2px solid var(--neon-pink);
            background: transparent;
            color: var(--neon-pink);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            text-shadow: 0 0 8px var(--neon-pink);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,45,149,0.3), transparent);
            transition: left 0.5s ease;
        }
        .btn:hover::before { left: 100%; }
        .btn:hover {
            background: var(--neon-pink);
            color: var(--navy);
            box-shadow: 0 0 30px rgba(255,45,149,0.5);
            transform: translateY(-2px);
            text-shadow: none;
        }

        /* ===== OVERLAYS ===== */
        .gavel-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; pointer-events: none; opacity: 0;
        }
        .gavel-overlay.active { animation: gavelFlash 1.2s ease; }
        @keyframes gavelFlash {
            0% { opacity: 0; }
            15% { opacity: 1; }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }
        .gavel-emoji {
            font-size: 140px;
            animation: gavelStrike 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97);
            filter: drop-shadow(0 0 30px rgba(201,168,76,0.6));
        }
        @keyframes gavelStrike {
            0%   { transform: rotate(-60deg) translateY(-150px) scale(0.3); }
            40%  { transform: rotate(15deg) translateY(0) scale(1.3); }
            60%  { transform: rotate(-5deg) translateY(5px) scale(1); }
            100% { transform: rotate(0deg) translateY(0) scale(1); }
        }

        .stamp-overlay {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg) scale(0);
            font-family: 'Press Start 2P', monospace;
            font-size: 36px;
            color: var(--red);
            border: 5px solid var(--red);
            padding: 12px 30px;
            border-radius: 8px;
            z-index: 200; pointer-events: none; opacity: 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(192,57,43,0.5);
        }
        .stamp-overlay.active { animation: stampEffect 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes stampEffect {
            0%   { transform: translate(-50%, -50%) rotate(-15deg) scale(4); opacity: 0; }
            25%  { transform: translate(-50%, -50%) rotate(-15deg) scale(0.85); opacity: 1; }
            40%  { transform: translate(-50%, -50%) rotate(-15deg) scale(1.1); opacity: 1; }
            60%  { transform: translate(-50%, -50%) rotate(-15deg) scale(1); opacity: 0.95; }
            100% { transform: translate(-50%, -50%) rotate(-15deg) scale(1); opacity: 0; }
        }

        /* ===== BOOM FLASH ===== */
        .boom-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 300;
            opacity: 0;
        }
        .boom-overlay.flash {
            animation: boomFlash 0.15s ease-out;
        }
        @keyframes boomFlash {
            0%   { opacity: 0.8; background: white; }
            100% { opacity: 0; background: transparent; }
        }

        /* ===== PARTICLES ===== */
        .particle {
            position: fixed;
            pointer-events: none; z-index: 50;
            font-size: 18px;
        }
        .particle.fall { animation: particleFall 3.5s ease-in forwards; }
        @keyframes particleFall {
            0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(100vh) rotate(1080deg) scale(0.3); }
        }
        .particle.explode { animation: particleExplode 1s ease-out forwards; }
        @keyframes particleExplode {
            0%   { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--ex), var(--ey)) scale(0.2); }
        }

        /* ===== SHOCKWAVE ===== */
        .shockwave {
            position: fixed; pointer-events: none; z-index: 60;
            border: 3px solid var(--gold);
            border-radius: 50%;
            animation: shockwaveExpand 0.6s ease-out forwards;
        }
        @keyframes shockwaveExpand {
            0%   { width: 10px; height: 10px; opacity: 0.8; }
            100% { width: 400px; height: 400px; opacity: 0; }
        }

        /* ===== TOOLTIPS ===== */
        .cell .hover-text {
            position: absolute; bottom: 4px;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px; color: var(--gold); opacity: 0;
            transition: opacity 0.3s; letter-spacing: 1px;
        }
        .cell:hover:not(.taken) .hover-text { opacity: 0.4; }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 16px; font-size: 8px;
            font-family: 'Press Start 2P', monospace;
            color: var(--gold-dark);
            letter-spacing: 1px;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        /* ===== MISC ===== */
        .draw-shake { animation: objection 0.6s ease; }
        @keyframes objection {
            0%, 100% { transform: translateX(0); }
            10% { transform: translateX(-12px) rotate(-2deg); }
            20% { transform: translateX(12px) rotate(2deg); }
            30% { transform: translateX(-12px) rotate(-2deg); }
            40% { transform: translateX(12px) rotate(2deg); }
            50% { transform: translateX(-6px); }
            60% { transform: translateX(6px); }
        }
        .screen-shake { animation: screenShake 0.35s ease; }
        @keyframes screenShake {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-4px, 3px); }
            40% { transform: translate(4px, -3px); }
            60% { transform: translate(-3px, 2px); }
            80% { transform: translate(3px, -1px); }
        }
        .swoosh-left  { animation: swooshLeft 0.4s ease; }
        .swoosh-right { animation: swooshRight 0.4s ease; }
        @keyframes swooshLeft {
            0% { transform: translateX(25px); opacity: 0.4; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes swooshRight {
            0% { transform: translateX(-25px); opacity: 0.4; }
            100% { transform: translateX(0); opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .cell { width: 85px; height: 85px; font-size: 34px; }
            .title { font-size: 22px; }
            .scoreboard { gap: 8px; }
            .score-card { min-width: 90px; padding: 6px 10px; }
            .stamp-overlay { font-size: 22px; }
        }
    </style>
</head>
<body>
    <!-- § Rain -->
    <div class="rain-container" id="rainContainer"></div>
    <!-- Retro grid -->
    <div class="retro-grid"></div>
    <!-- Scanlines -->
    <div class="scanlines"></div>
    <!-- Boom flash -->
    <div class="boom-overlay" id="boomOverlay"></div>
    <!-- Gavel overlay -->
    <div class="gavel-overlay" id="gavelOverlay"><div class="gavel-emoji">⚖️</div></div>
    <!-- Stamp overlay -->
    <div class="stamp-overlay" id="stampOverlay"></div>

    <!-- Music controls -->
    <div class="music-controls">
        <button class="music-btn" id="musicToggle" onclick="toggleMusic()">♪ MUSIK</button>
        <button class="music-btn" id="sfxToggle" onclick="toggleSfx()">BOOM</button>
    </div>

    <div class="container" id="mainContainer">
        <div class="header">
            <div class="kanzlei-name">Kanzlei Kreuzer &amp; Kreis</div>
            <div class="title">TIC TAC <span class="accent">§</span></div>
            <div class="subtitle">AKTENZEICHEN: TTT-§42/2026</div>
        </div>
        <div class="divider"></div>
        <div class="scoreboard">
            <div class="score-card active" id="scoreX">
                <div class="player-label">Kläger</div>
                <div class="player-name">✕ Paragraph</div>
                <div class="score-value" id="scoreXVal">0</div>
            </div>
            <div class="score-card" id="scoreO">
                <div class="player-label">Beklagter</div>
                <div class="player-name">○ Subsumtion</div>
                <div class="score-value" id="scoreOVal">0</div>
            </div>
        </div>
        <div class="board-frame" id="boardFrame">
            <div class="board" id="board">
                <div class="cell" data-index="0" onclick="makeMove(0)"><span class="hover-text">§ 1</span></div>
                <div class="cell" data-index="1" onclick="makeMove(1)"><span class="hover-text">§ 2</span></div>
                <div class="cell" data-index="2" onclick="makeMove(2)"><span class="hover-text">§ 3</span></div>
                <div class="cell" data-index="3" onclick="makeMove(3)"><span class="hover-text">§ 4</span></div>
                <div class="cell" data-index="4" onclick="makeMove(4)"><span class="hover-text">§ 5</span></div>
                <div class="cell" data-index="5" onclick="makeMove(5)"><span class="hover-text">§ 6</span></div>
                <div class="cell" data-index="6" onclick="makeMove(6)"><span class="hover-text">§ 7</span></div>
                <div class="cell" data-index="7" onclick="makeMove(7)"><span class="hover-text">§ 8</span></div>
                <div class="cell" data-index="8" onclick="makeMove(8)"><span class="hover-text">§ 9</span></div>
            </div>
        </div>
        <div class="status-area">
            <div class="status-message" id="statusMsg">Der Kläger ✕ eröffnet die Verhandlung</div>
            <div class="legal-quote" id="legalQuote">„Vor Gericht und auf hoher See ist man in Gottes Hand."</div>
        </div>
        <button class="btn" id="newGameBtn" onclick="newGame()" style="display:none;">REVISION</button>
        <div class="footer">© 2026 KANZLEI KREUZER & KREIS · OHNE GEWÄHR</div>
    </div>

<script>
// =====================================================================
// GAME STATE
// =====================================================================
let board = Array(9).fill(null);
let currentPlayer = 'X';
let gameActive = true;
let scores = { X: 0, O: 0 };
let moveCount = 0;
let musicOn = false;
let sfxOn = true;

// =====================================================================
// WEB AUDIO — 80s MIDI SYNTH ENGINE
// =====================================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let masterGain;
let musicGain;
let sfxGain;
let bgMusicInterval;
let bgDrumInterval;
let bgBassInterval;

function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new AudioCtx();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.7;
        masterGain.connect(audioCtx.destination);
        musicGain = audioCtx.createGain();
        musicGain.gain.value = 0;
        musicGain.connect(masterGain);
        sfxGain = audioCtx.createGain();
        sfxGain.gain.value = 1;
        sfxGain.connect(masterGain);
    }
}

// --- Basic synth voice ---
function playNote(freq, duration, type, vol, dest, detune = 0, delay = 0) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (detune) osc.detune.setValueAtTime(detune, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(dest || sfxGain);
    osc.start(t);
    osc.stop(t + duration);
}

// --- 80s FM synth chord ---
function playFMChord(freqs, duration, dest) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    freqs.forEach(freq => {
        // Carrier
        const carrier = audioCtx.createOscillator();
        const carrierGain = audioCtx.createGain();
        carrier.type = 'sine';
        carrier.frequency.setValueAtTime(freq, t);
        carrierGain.gain.setValueAtTime(0.08, t);
        carrierGain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        // Modulator
        const mod = audioCtx.createOscillator();
        const modGain = audioCtx.createGain();
        mod.type = 'sine';
        mod.frequency.setValueAtTime(freq * 2, t);
        modGain.gain.setValueAtTime(200, t);
        modGain.gain.exponentialRampToValueAtTime(1, t + duration);
        mod.connect(modGain);
        modGain.connect(carrier.frequency);
        carrier.connect(carrierGain);
        carrierGain.connect(dest || musicGain);
        carrier.start(t);
        mod.start(t);
        carrier.stop(t + duration);
        mod.stop(t + duration);
    });
}

// --- 80s Drum machine ---
function playKick(dest) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.12);
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain);
    gain.connect(dest || musicGain);
    osc.start(t);
    osc.stop(t + 0.15);
}

function playSnare(dest) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Noise burst
    const bufferSize = audioCtx.sampleRate * 0.08;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.25, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    noise.connect(noiseGain);
    noiseGain.connect(dest || musicGain);
    noise.start(t);
    // Body
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, t);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    osc.connect(gain);
    gain.connect(dest || musicGain);
    osc.start(t);
    osc.stop(t + 0.06);
}

function playHihat(dest) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.03;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    // High-pass filter
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 8000;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(dest || musicGain);
    noise.start(t);
}

// --- 80s BACKGROUND MUSIC LOOP ---
// A minor pentatonic synthwave arpeggio + bass + drums
const BPM = 120;
const BEAT = 60 / BPM;
let musicStep = 0;

// Chord progression: Am - F - C - G (classic 80s)
const chordProg = [
    [220, 261.63, 329.63],    // Am
    [174.61, 220, 261.63],    // F
    [261.63, 329.63, 392],    // C
    [196, 246.94, 293.66],    // G
];
const bassNotes = [110, 87.31, 130.81, 98]; // A2, F2, C3, G2
const arpeggioNotes = [
    [440, 523, 659, 523],     // Am arpeggio
    [349, 440, 523, 440],     // F
    [523, 659, 784, 659],     // C
    [392, 494, 587, 494],     // G
];

function startMusic() {
    ensureAudio();
    musicGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
    musicStep = 0;
    let arpStep = 0;
    let chordIdx = 0;
    let beatInBar = 0;

    // Arpeggio: 16th notes
    bgMusicInterval = setInterval(() => {
        if (!musicOn) return;
        const notes = arpeggioNotes[chordIdx];
        const note = notes[arpStep % notes.length];
        playNote(note, 0.12, 'square', 0.06, musicGain, Math.random() * 10 - 5);
        playNote(note * 2, 0.08, 'sawtooth', 0.02, musicGain, 7);
        arpStep++;
    }, BEAT * 250); // 16th note timing

    // Bass: quarter notes
    bgBassInterval = setInterval(() => {
        if (!musicOn) return;
        const bass = bassNotes[chordIdx];
        playNote(bass, BEAT * 0.9, 'sawtooth', 0.15, musicGain);
        playNote(bass, BEAT * 0.9, 'square', 0.05, musicGain, -5);
        beatInBar++;
        if (beatInBar >= 4) {
            beatInBar = 0;
            chordIdx = (chordIdx + 1) % chordProg.length;
            // Pad chord on chord change
            playFMChord(chordProg[chordIdx], BEAT * 3.5, musicGain);
        }
    }, BEAT * 1000);

    // Drums: 8th notes
    let drumStep = 0;
    bgDrumInterval = setInterval(() => {
        if (!musicOn) return;
        // Kick on 1 and 3
        if (drumStep % 4 === 0) playKick(musicGain);
        // Snare on 2 and 4
        if (drumStep % 4 === 2) playSnare(musicGain);
        // Hihat on every 8th
        playHihat(musicGain);
        drumStep++;
    }, BEAT * 500);

    // Initial chord
    playFMChord(chordProg[0], BEAT * 3.5, musicGain);
}

function stopMusic() {
    if (musicGain) musicGain.gain.setValueAtTime(0, audioCtx.currentTime);
    clearInterval(bgMusicInterval);
    clearInterval(bgDrumInterval);
    clearInterval(bgBassInterval);
}

function toggleMusic() {
    ensureAudio();
    musicOn = !musicOn;
    const btn = document.getElementById('musicToggle');
    if (musicOn) {
        btn.classList.add('active');
        btn.textContent = '♪ ON';
        startMusic();
    } else {
        btn.classList.remove('active');
        btn.textContent = '♪ MUSIK';
        stopMusic();
    }
}

function toggleSfx() {
    sfxOn = !sfxOn;
    const btn = document.getElementById('sfxToggle');
    if (sfxOn) {
        btn.classList.add('active');
        btn.textContent = 'BOOM!';
        if (sfxGain) sfxGain.gain.value = 1;
    } else {
        btn.classList.remove('active');
        btn.textContent = 'BOOM';
        if (sfxGain) sfxGain.gain.value = 0;
    }
}

function playSwoosh80s() {
    ensureAudio();
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(1200, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.2);
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(gain);
    gain.connect(sfxGain);
    osc.start(t);
    osc.stop(t + 0.25);
    // Add noise swoosh layer
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.06, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(2000, t);
    filter.frequency.exponentialRampToValueAtTime(200, t + 0.15);
    noise.connect(filter);
    filter.connect(ng);
    ng.connect(sfxGain);
    noise.start(t);
}

function playBoom() {
    ensureAudio();
    const t = audioCtx.currentTime;
    // Deep explosion
    const osc1 = audioCtx.createOscillator();
    const g1 = audioCtx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(80, t);
    osc1.frequency.exponentialRampToValueAtTime(20, t + 0.5);
    g1.gain.setValueAtTime(0.5, t);
    g1.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc1.connect(g1);
    g1.connect(sfxGain);
    osc1.start(t);
    osc1.stop(t + 0.5);
    // Distorted crunch
    const osc2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    const dist = audioCtx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) { const x = (i * 2) / 256 - 1; curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x)); }
    dist.curve = curve;
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(200, t);
    osc2.frequency.exponentialRampToValueAtTime(30, t + 0.3);
    g2.gain.setValueAtTime(0.15, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc2.connect(dist);
    dist.connect(g2);
    g2.connect(sfxGain);
    osc2.start(t);
    osc2.stop(t + 0.35);
    // Noise blast
    const bufferSize = audioCtx.sampleRate * 0.2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.2, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    noise.connect(ng);
    ng.connect(sfxGain);
    noise.start(t);
}

function spawnParticles(type = 'win', originX, originY) {
    const symbols = type === 'win'
        ? ['§', '§', '⚖', '§', '¶', '§', '✕', '○', '§', '†', '§']
        : ['§', '📋', '§', '⚖'];
    const count = type === 'win' ? 45 : 15;
    for (let i = 0; i < count; i++) {
        setTimeout(() => {
            const p = document.createElement('div');
            if (originX !== undefined) {
                // Explosion from point
                p.className = 'particle explode';
                const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
                const dist = 100 + Math.random() * 250;
                p.style.setProperty('--ex', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ey', Math.sin(angle) * dist + 'px');
                p.style.left = originX + 'px';
                p.style.top = originY + 'px';
            } else {
                // Fall from top
                p.className = 'particle fall';
                p.style.left = (Math.random() * 100) + 'vw';
                p.style.top = '-30px';
            }
            p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            p.style.fontSize = (14 + Math.random() * 20) + 'px';
            p.style.color = ['var(--neon-pink)', 'var(--neon-blue)', 'var(--gold)', 'var(--neon-green)', 'var(--neon-purple)'][Math.floor(Math.random() * 5)];
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 4000);
        }, i * 30);
    }
}

// =====================================================================
// GAME LOGIC
// =====================================================================
function makeMove(index) {
    if (!gameActive || board[index]) return;
    ensureAudio();

    board[index] = currentPlayer;
    moveCount++;

    const cell = document.querySelectorAll('.cell')[index];
    cell.classList.add('taken');

    // Cell flash
    const flash = document.createElement('div');
    flash.className = 'cell-flash';
    cell.appendChild(flash);
    setTimeout(() => flash.remove(), 300);

    // Mark
    const mark = document.createElement('span');
    mark.className = `mark ${currentPlayer === 'X' ? 'x-mark' : 'o-mark'}`;
    mark.textContent = currentPlayer === 'X' ? '✕' : '○';
    const hoverText = cell.querySelector('.hover-text');
    if (hoverText) hoverText.remove();
    cell.appendChild(mark);

    // Sounds
    playSwoosh80s();
    setTimeout(() => playStamp80s(), 120);

    // Shockwave from cell center
    const rect = cell.getBoundingClientRect();
    spawnShockwave(rect.left + rect.width / 2, rect.top + rect.height / 2);

    // Screen shake
    document.getElementById('mainContainer').classList.add('screen-shake');
    setTimeout(() => document.getElementById('mainContainer').classList.remove('screen-shake'), 350);

    // Small boom flash
    boomFlash();

    // Win?
    const winResult = checkWin();
    if (winResult) {
        gameActive = false;
        handleWin(winResult);
        return;
    }
    // Draw?
    if (moveCount === 9) {
        gameActive = false;
        handleDraw();
        return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    updateTurnDisplay();
    showRandomQuote();
}

function checkWin() {
    for (const pattern of winPatterns) {
        const [a, b, c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            return { winner: board[a], pattern };
        }
    }
    return null;
}

function handleWin(result) {
    const { winner, pattern } = result;
    scores[winner]++;

    // Highlight winning cells
    const cells = document.querySelectorAll('.cell');
    pattern.forEach(i => cells[i].classList.add('winning'));

    // Score bump
    const scoreEl = document.getElementById(winner === 'X' ? 'scoreXVal' : 'scoreOVal');
    scoreEl.textContent = scores[winner];
    scoreEl.classList.add('bump');
    setTimeout(() => scoreEl.classList.remove('bump'), 500);

    // Status
    const quotes = winner === 'X' ? winQuotesX : winQuotesO;
    const statusMsg = document.getElementById('statusMsg');
    statusMsg.textContent = quotes[Math.floor(Math.random() * quotes.length)];
    statusMsg.classList.add('announce');

    const legalQuote = document.getElementById('legalQuote');
    legalQuote.textContent = winner === 'X'
        ? '„Der Kläger hat obsiegt. Das Urteil ist rechtskräftig."'
        : '„Der Beklagte geht als Sieger aus dem Verfahren hervor."';
    legalQuote.classList.add('fade-in');

    // GAVEL
    const gavel = document.getElementById('gavelOverlay');
    gavel.classList.add('active');
    setTimeout(() => gavel.classList.remove('active'), 1400);

    // STAMP
    const stamp = document.getElementById('stampOverlay');
    stamp.textContent = winner === 'X' ? 'STATTGEGEBEN' : 'FREISPRUCH';
    stamp.style.color = '';
    stamp.style.borderColor = '';
    stamp.classList.add('active');
    setTimeout(() => stamp.classList.remove('active'), 1800);

    // BOOM!
    boomFlash();
    setTimeout(boomFlash, 200);
    setTimeout(boomFlash, 400);

    // Sounds
    playBoom();
    playGavel80s();
    setTimeout(playWinFanfare80s, 500);

    // Particles: explosion from board center + rain from top
    const boardRect = document.getElementById('board').getBoundingClientRect();
    const cx = boardRect.left + boardRect.width / 2;
    const cy = boardRect.top + boardRect.height / 2;
    spawnShockwave(cx, cy);
    setTimeout(() => {
        spawnParticles('win', cx, cy);
        spawnParticles('win'); // also rain from top
        burstRain(40);
    }, 200);

    // Show button
    setTimeout(() => {
        const btn = document.getElementById('newGameBtn');
        btn.style.display = 'inline-block';
        btn.textContent = 'REVISION';
        btn.classList.add('announce');
    }, 1000);
}

function handleDraw() {
    // Shake board
    const boardFrame = document.getElementById('boardFrame');
    boardFrame.classList.add('draw-shake');
    setTimeout(() => boardFrame.classList.remove('draw-shake'), 600);

    // Status
    const statusMsg = document.getElementById('statusMsg');
    statusMsg.textContent = drawQuotes[Math.floor(Math.random() * drawQuotes.length)];
    statusMsg.classList.add('announce');

    const legalQuote = document.getElementById('legalQuote');
    legalQuote.textContent = '„Wenn zwei sich streiten, freut sich der Richter über Feierabend."';
    legalQuote.classList.add('fade-in');

    // Gold stamp
    const stamp = document.getElementById('stampOverlay');
    stamp.textContent = 'EINGESTELLT';
    stamp.style.color = 'var(--gold)';
    stamp.style.borderColor = 'var(--gold)';
    stamp.classList.add('active');
    setTimeout(() => { stamp.classList.remove('active'); stamp.style.color = ''; stamp.style.borderColor = ''; }, 1500);

    // Objection sound
    playObjection();
    setTimeout(playDrawBuzz80s, 300);
    spawnParticles('draw');
    burstRain(15);

    // Button
    setTimeout(() => {
        const btn = document.getElementById('newGameBtn');
        btn.style.display = 'inline-block';
        btn.textContent = 'NEUVERHANDLUNG';
        btn.classList.add('announce');
    }, 600);
}

function updateTurnDisplay() {
    const scoreX = document.getElementById('scoreX');
    const scoreO = document.getElementById('scoreO');
    if (currentPlayer === 'X') {
        scoreX.classList.add('active');
        scoreO.classList.remove('active');
        scoreX.classList.add('swoosh-left');
        setTimeout(() => scoreX.classList.remove('swoosh-left'), 400);
    } else {
        scoreO.classList.add('active');
        scoreX.classList.remove('active');
        scoreO.classList.add('swoosh-right');
        setTimeout(() => scoreO.classList.remove('swoosh-right'), 400);
    }
    const msgs = turnMessages[currentPlayer];
    document.getElementById('statusMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
}

function showRandomQuote() {
    const el = document.getElementById('legalQuote');
    el.classList.remove('fade-in');
    void el.offsetWidth;
    el.textContent = moveQuotes[Math.floor(Math.random() * moveQuotes.length)];
    el.classList.add('fade-in');
}

function newGame() {
    board = Array(9).fill(null);
    currentPlayer = 'X';
    gameActive = true;
    moveCount = 0;

    const cells = document.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
        setTimeout(() => {
            cell.classList.remove('taken', 'winning');
            cell.innerHTML = `<span class="hover-text">§ ${i + 1}</span>`;
            cell.style.animation = 'none';
            void cell.offsetWidth;
            cell.style.animation = 'fadeInUp 0.3s ease';
        }, i * 50);
    });

    const statusMsg = document.getElementById('statusMsg');
    statusMsg.classList.remove('announce');
    setTimeout(() => {
        statusMsg.textContent = 'Neue Verhandlung eröffnet — Der Kläger ✕ beginnt';
        statusMsg.classList.add('announce');
    }, 300);

    document.getElementById('legalQuote').textContent = '„Vor Gericht und auf hoher See ist man in Gottes Hand."';
    document.getElementById('scoreX').classList.add('active');
    document.getElementById('scoreO').classList.remove('active');
    document.getElementById('newGameBtn').style.display = 'none';

    playNewRound();
    burstRain(10);
}

// =====================================================================
// INIT
// =====================================================================
initRain();
// Auto-activate SFX button styling
document.getElementById('sfxToggle').classList.add('active');
document.getElementById('sfxToggle').textContent = 'BOOM!';
</script>
